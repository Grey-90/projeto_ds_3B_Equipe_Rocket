<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-box">
        <h1>Bem Vindo de volta!</h1>
        <h2>LOGIN</h2>

        <div id="message" class="message" style="display: none;"></div>

        <form action="index.php" method="post" id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input name="email" type="email" id="email" placeholder="email@exemplo.com" required>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input name="senha" type="password" id="password" placeholder="Sua senha" required>
            </div>

            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="remember"> Lembrar-me
                </label>
            </div>

            <button type="submit">Entrar</button>
        </form >

        <div class="link">
            <a href="#">Esqueceu a senha?</a> | <a href="#">Cadastro</a>
        </div>
    </div>
</body>
</html>
